<!DOCTYPE html>
<html>
<head>
    <title>Calorie Predictor</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f5f5f5;
        }

        h1 { color: #333; }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, button {
            margin: 5px;
            padding: 10px;
            width: 200px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 5px;
        }
    </style>
</head>
<body>

<h1> Calorie Prediction App</h1>

<div class="box">
    <h2>Ввод данных</h2>
    <form method="POST">
        <input type="number" step="any" name="protein" placeholder="Protein (g)" required><br>
        <input type="number" step="any" name="fat" placeholder="Fat (g)" required><br>
        <input type="number" step="any" name="carbs" placeholder="Carbs (g)" required><br>
        <input type="number" step="any" name="sugar" placeholder="Sugar (g)" required><br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h3> Предсказание: {{ prediction }} ккал</h3>
    {% endif %}
</div>

<div class="box">
    <h2> Метрики модели</h2>
    <pre>{{ metrics }}</pre>
</div>

<div class="box">
    <h2> График</h2>
    <img src="{{ url_for('static', filename='plot.png') }}" width="500">
</div>

<div class="box">
    <h2> Примеры данных</h2>
    {{ samples|safe }}
</div>

</body>
</html>
